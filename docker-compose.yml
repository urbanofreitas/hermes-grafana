services:
  # ─── Metrics Database ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: hermes-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - hermes-observability

  # ─── Node / Host Metrics ───────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: hermes-node-exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/host/root'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - hermes-observability

  # ─── Log Aggregation ───────────────────────────────────────────
  loki:
    image: grafana/loki:3.5.0
    container_name: hermes-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - hermes-observability

  # ─── Log Shipper ──────────────────────────────────────────────
  promtail:
    image: grafana/promtail:3.5.0
    container_name: hermes-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - ${HERMES_HOME:-/home/urbano/.hermes}:/hermes:ro
      - promtail-data:/tmp
    networks:
      - hermes-observability
    depends_on:
      - loki

  # ─── Hermes SQLite Metrics Exporter ──────────────────────────
  sqlite-exporter:
    build:
      context: ./sqlite-exporter
      dockerfile: Dockerfile
    container_name: hermes-sqlite-exporter
    restart: unless-stopped
    volumes:
      - ${HERMES_HOME:-/home/urbano/.hermes}:/hermes:ro
    ports:
      - "127.0.0.1:9200:9200"
    environment:
      HERMES_DB_ROOT: /hermes
      EXPORTER_PORT: 9200
    networks:
      - hermes-observability

  # ─── Grafana Dashboards ──────────────────────────────────────
  grafana:
    image: grafana/grafana-oss:12.0.1
    container_name: hermes-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: hermes-grafana-2026
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000/
      GF_LIVE_ALLOWED_ORIGINS: "*"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
      - ./dashboards:/var/lib/grafana/dashboards/hermes:ro
    networks:
      - hermes-observability
    depends_on:
      - prometheus
      - loki

networks:
  hermes-observability:
    driver: bridge

volumes:
  prometheus-data:
  loki-data:
  promtail-data:
  grafana-data:
