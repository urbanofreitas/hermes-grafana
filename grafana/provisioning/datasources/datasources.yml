apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: GET
      manageAlerts: false

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      manageAlerts: false
      derivedFields:
        - name: 'traceID'
          matcherType: 'label'
          matcherRegex: 'traceID'
          url: '$${__value.raw}'
